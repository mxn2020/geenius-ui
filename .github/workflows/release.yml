name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build, Publish & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Publish @geenius-ui/shared
        run: pnpm --filter @geenius-ui/shared publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @geenius-ui/react
        run: pnpm --filter @geenius-ui/react publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @geenius-ui/solid
        run: pnpm --filter @geenius-ui/solid publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @geenius-ui/react-css
        run: pnpm --filter @geenius-ui/react-css publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @geenius-ui/solid-css
        run: pnpm --filter @geenius-ui/solid-css publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ## Packages

            | Package | Version |
            |---|---|
            | `@geenius-ui/react` | [${{ github.ref_name }}](https://www.npmjs.com/package/@geenius-ui/react) |
            | `@geenius-ui/react-css` | [${{ github.ref_name }}](https://www.npmjs.com/package/@geenius-ui/react-css) |
            | `@geenius-ui/solid` | [${{ github.ref_name }}](https://www.npmjs.com/package/@geenius-ui/solid) |
            | `@geenius-ui/solid-css` | [${{ github.ref_name }}](https://www.npmjs.com/package/@geenius-ui/solid-css) |
            | `@geenius-ui/shared` | [${{ github.ref_name }}](https://www.npmjs.com/package/@geenius-ui/shared) |
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
